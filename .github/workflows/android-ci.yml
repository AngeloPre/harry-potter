name: CI e Build APK Android

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    name: Build do APK Android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v6

      - name: Configurar JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup do Gradle (com cache)
        uses: gradle/actions/setup-gradle@v6

      - name: Permissão de execução no gradlew
        run: chmod +x ./gradlew

      - name: Compilar APK de debug
        run: ./gradlew assembleDebug

      - name: Renomear APK
        run: mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/harry-potter.apk

      - name: Upload do APK como artefato
        uses: actions/upload-artifact@v7
        with:
          name: harry-potter-apk
          path: app/build/outputs/apk/debug/harry-potter.apk

  release:
    name: Publicar GitHub Release
    needs: build-apk
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout do código
        uses: actions/checkout@v6

      - name: Baixar APK do artefato
        uses: actions/download-artifact@v8
        with:
          name: harry-potter-apk
          path: ./apk

      - name: Criar GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ github.run_number }}" \
            ./apk/harry-potter.apk \
            --title "Release v${{ github.run_number }}" \
            --notes "Build automático gerado pelo workflow run #${{ github.run_number }} (commit ${{ github.sha }})." \
            --repo "${{ github.repository }}"